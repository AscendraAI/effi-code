name: Package interest
description: 실전 문서 킷(유료 패키지) 사전 관심 등록 — 판매 강요 아님
title: "[interest] "
labels: ["package-interest"]
body:
  - type: markdown
    attributes:
      value: |
        감사합니다. **effi-code 자체는 계속 무료(Apache-2.0)** 입니다.

        여기는 *실전 케이스 + 운영 플레이북* 문서 킷에 관심이 있을 때만 남겨 주세요.
        스팸·가격 흥정 스레드는 닫을 수 있습니다.
  - type: dropdown
    id: use_case
    attributes:
      label: 주로 쓰는 환경
      options:
        - Claude Code 구독
        - API 키 위주
        - 로컬(Ollama) 위주
        - 아직 탐색 중
    validations:
      required: true
  - type: dropdown
    id: interest
    attributes:
      label: 관심 있는 것
      options:
        - 비용 라우팅·로컬 폴백 심화
        - 실제 출시 케이스 스터디
        - 인프라 체크리스트
        - 전부 소식만
      multiple: true
    validations:
      required: true
  - type: textarea
    id: note
    attributes:
      label: 한 줄 메모 (선택)
      placeholder: 예) 16GB 맥, 쿼터 자주  Damian / 솔로 SaaS 준비 중
  - type: checkboxes
    id: consent
    attributes:
      label: 동의
      options:
        - label: 이슈는 공개됩니다. 개인 연락처·시크릿을 적지 않겠습니다.
          required: true
